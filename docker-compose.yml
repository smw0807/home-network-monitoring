services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    environment:
      # 브라우저에서 직접 접근하는 URL — nginx가 /api, /ws를 백엔드로 프록시하므로
      # 빈 문자열로 두면 상대경로($fetch('/api/...'))로 동작 (권장)
      - NUXT_PUBLIC_API_URL=
      # 빈 문자열이면 useWebSocket이 window.location.host 기반으로 자동 설정
      - NUXT_PUBLIC_WS_URL=
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      - ES_NODE=http://elasticsearch:9200
      - ROUTER_IP=${ROUTER_IP:-192.168.0.1}
      - SNMP_COMMUNITY=${SNMP_COMMUNITY:-public}
      - SNMP_IF_INDEX=${SNMP_IF_INDEX:-2}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-2000}
      - PORT=4000
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/api/settings || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app-net

volumes:
  es-data:

networks:
  app-net:
    driver: bridge
